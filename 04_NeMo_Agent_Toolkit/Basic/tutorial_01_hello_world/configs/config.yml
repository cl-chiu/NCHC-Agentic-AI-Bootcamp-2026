# Tutorial 01：Hello World
#
# 最簡單的 NeMo Agent Toolkit workflow。
# 一個 LLM + 一個內建 tool + 一種 agent。
#
# 執行：
#   nat run --config_file tutorial_01_hello_world/configs/config.yml \
#           --input "What time is it right now? And say hello!"

# ── Tools (Functions) ────────────────────────────────────────────────────────
functions:
  get_time:
    _type: current_datetime   # 內建 tool — 傳回當前日期與時間

# ── Language Models ──────────────────────────────────────────────────────────
llms:
  nemotron:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    temperature: 1.0
    max_tokens: 4096

# ── Workflow ─────────────────────────────────────────────────────────────────
workflow:
  _type: tool_calling_agent
  llm_name: nemotron
  tool_names:
    - get_time
  verbose: true
