# Tutorial 03：自訂 Tool Agent
#
# 使用一個用 Python 寫的自訂 tool：
#   - temperature_converter  (C / F / K)
#
# 前置需求：
#   uv sync   （會自動安裝 nchc_unit_converter package）
#
# 執行：
#   nat run --config_file tutorial_03_custom_tool/configs/config.yml \
#           --input "Convert 100 Celsius to Fahrenheit."

# ── Tools (Functions) ────────────────────────────────────────────────────────
functions:
  convert_temperature:
    _type: temperature_converter    # 在 nchc_unit_converter/register.py 內註冊

# ── Language Models ──────────────────────────────────────────────────────────
llms:
  nemotron:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 4096

# ── Workflow ─────────────────────────────────────────────────────────────────
workflow:
  _type: tool_calling_agent
  llm_name: nemotron
  tool_names:
    - convert_temperature
  verbose: true
